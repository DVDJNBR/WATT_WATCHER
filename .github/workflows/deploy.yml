name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: read
  id-token: write  # for OIDC if needed

jobs:
  # ── Azure Functions deployment ──────────────────────────────────────────────
  deploy-functions:
    name: Deploy Azure Functions
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests before deploy
        run: uv run python -m pytest tests/ -q --tb=short

      - name: Prepare deployment package
        run: |
          # Azure Functions expects function_app.py + host.json at package root.
          cp host.json functions/
          uv export --format requirements-txt --no-hashes --no-dev -o functions/requirements.txt
          # Pre-install manylinux2014 wheels (glibc ≥ 2.17, compatible with Azure Functions
          # Linux containers). This avoids the 1.5 GB Oryx remote-build memory limit on the
          # Linux Consumption plan which silently crashes, leaving packages uninstalled.
          pip install \
            --platform manylinux2014_x86_64 \
            --only-binary :all: \
            --python-version 3.11 \
            --implementation cp \
            --target functions/.python_packages/lib/site-packages \
            -r functions/requirements.txt

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          package: functions
          scm-do-build-during-deployment: false

  # ── Frontend build + Azure Storage Static Website deployment ────────────────
  deploy-frontend:
    name: Deploy Frontend (Azure Storage)
    runs-on: ubuntu-latest
    needs: deploy-functions
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.AZURE_FUNCTIONS_URL }}
          VITE_AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          VITE_SKIP_AUTH: "false"
        run: npm run build

      - name: Deploy to Azure Storage Static Website
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            az storage blob upload-batch \
              --account-name ${{ secrets.AZURE_FRONTEND_STORAGE_NAME }} \
              --account-key "${{ secrets.AZURE_FRONTEND_STORAGE_KEY }}" \
              --source frontend/dist \
              --destination '$web' \
              --overwrite true
